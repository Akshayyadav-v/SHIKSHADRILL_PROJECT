<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Results</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Poppins:wght@300;400;600&display=swap');

        body {
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
            overflow-y: hidden;
        }

        .game-title {
            font-family: 'Fredoka One', cursive;
        }

        .pulse {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }
        }

        .glow {
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.7), 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .progress-bar {
            transition: width 1s ease-in-out;
        }

        /* Floating Emoji Animation */
        .emoji-float {
            position: fixed;
            font-size: 2rem;
            animation: floatUp 4s linear forwards;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }

            100% {
                transform: translateY(-300px) scale(0.5);
                opacity: 0;
            }
        }
    </style>
</head>

<body
    class="bg-gradient-to-br from-blue-200 via-indigo-300 to-purple-400 min-h-screen flex items-center justify-center relative">

    <!-- Result Card -->
    <div class="bg-white rounded-3xl shadow-2xl p-8 max-w-md w-full text-center relative overflow-hidden z-10">

        <!-- Trophy Animation -->
        <div class="flex justify-center mb-4">
            <div id="trophy"
                class="w-20 h-20 flex items-center justify-center text-5xl bg-gradient-to-br from-yellow-400 to-orange-500 rounded-full pulse">
                🏆
            </div>
        </div>

        <!-- Result Summary -->
        <h2 id="summary" class="text-2xl font-bold text-gray-800 mb-2 glow">Well Done Huzaifa!</h2>
        <p id="message" class="mb-4 text-gray-600">Outstanding! 🌟 Keep it up.</p>

        <!-- Score -->
        <div class="bg-gradient-to-r from-purple-600 to-indigo-600 text-white py-4 rounded-xl mb-6">
            <p class="text-lg">Your Score</p>
            <p id="score" class="text-3xl font-bold">3 / 5</p>
        </div>

        <!-- Detailed Stats -->
        <div class="grid grid-cols-2 gap-4 mb-4">
            <div class="bg-green-100 text-green-700 rounded-xl p-3 font-semibold">✅ Correct: <span id="correct">3</span>
            </div>
            <div class="bg-red-100 text-red-700 rounded-xl p-3 font-semibold">❌ Wrong: <span id="wrong">2</span></div>
            <div class="bg-blue-100 text-blue-700 rounded-xl p-3 font-semibold col-span-2">⏱️ Time Taken: <span
                    id="time">2m 30s</span></div>
        </div>

        <!-- Accuracy Bar -->
        <div class="mb-6">
            <p class="text-gray-700 font-semibold mb-1">🎯 Accuracy</p>
            <div class="w-full bg-gray-200 rounded-full h-4">
                <div id="accuracy-bar" class="bg-indigo-600 h-4 rounded-full progress-bar" style="width:60%"></div>
            </div>
            <p id="accuracy" class="text-sm mt-1">60%</p>
        </div>

        <!-- Gamification Features -->
        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="bg-gradient-to-br from-yellow-400 to-orange-500 text-white rounded-xl p-3">
                <p class="text-lg">💰</p>
                <p id="coins" class="font-bold">30</p>
                <p class="text-xs">Coins</p>
            </div>
            <div class="bg-gradient-to-br from-pink-400 to-purple-500 text-white rounded-xl p-3">
                <p class="text-lg">🎖</p>
                <p id="badge" class="font-bold">Unlocked</p>
                <p class="text-xs">Badge</p>
            </div>
        </div>

        <!-- Level Up -->
        <div id="levelUp" class="hidden mb-6 text-lg font-bold text-purple-600 animate-bounce">🎮 Level Up!</div>

        <!-- Chart -->
        <div class="flex justify-center mb-6">
            <canvas id="resultChart" style="max-width:200px; max-height:200px;"></canvas>
        </div>

        <!-- Streak + Rank -->
        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="bg-orange-100 text-orange-700 rounded-xl p-3 font-semibold">🔥 Streak: <span id="streak">5
                    days</span></div>
            <div class="bg-indigo-100 text-indigo-700 rounded-xl p-3 font-semibold">🏅 Rank: <span id="rank">#3</span>
            </div>
        </div>

        <!-- Buttons -->
        <div class="flex justify-between space-x-4">
            <button
                class="flex-1 bg-gradient-to-r from-gray-300 to-gray-400 text-gray-800 py-3 rounded-xl font-semibold hover:scale-105 transition">
                🔄 More Quizzes
            </button>
            <button
                class="flex-1 bg-gradient-to-r from-blue-600 to-indigo-600 text-white py-3 rounded-xl font-semibold hover:scale-105 transition">
                📊 Dashboard
            </button>
        </div>

        <script>
            // Get data from URL parameters
            const params = new URLSearchParams(window.location.search);
            const correct = parseInt(params.get('correct')) || 0;
            const total = parseInt(params.get('total')) || 0;
            const wrong = total - correct;
            const accuracy = total > 0 ? (correct / total) * 100 : 0;
            const timeTaken = params.get('time') || "0m 0s";
            const name = params.get('name') || "Student";
            const level = params.get('level') || "medium";
            const xpEarned = parseInt(params.get('xp')) || 0;
            const totalXP = parseInt(params.get('totalXP')) || 0;

            console.log('Result page loaded with:', {
                correct, total, wrong, accuracy, timeTaken, name, level, xpEarned, totalXP
            });

            // Update UI with real data
            document.getElementById("correct").textContent = correct;
            document.getElementById("wrong").textContent = wrong;
            document.getElementById("time").textContent = timeTaken;
            document.getElementById("score").textContent = `${correct} / ${total}`;
            document.getElementById("accuracy").textContent = `${accuracy.toFixed(0)}%`;
            document.getElementById("accuracy-bar").style.width = `${accuracy}%`;

            // Calculate coins based on level
            let coinRate = 0;
            if (level === "easy") coinRate = 5;
            else if (level === "medium") coinRate = 10;
            else if (level === "hard") coinRate = 20;
            const coinsEarned = correct * coinRate;
            document.getElementById("coins").textContent = xpEarned; // Show actual XP earned

            // Update summary and message based on performance
            let summary = "";
            let message = "";
            if (accuracy === 100) {
                summary = `Perfect Score ${name}!`;
                message = "✨ Flawless Victory";
                document.getElementById("trophy").textContent = "🏆";
            } else if (accuracy >= 80) {
                summary = `Well Done ${name}!`;
                message = "Outstanding! 🌟 Keep it up.";
                document.getElementById("trophy").textContent = "🏆";
            } else if (accuracy >= 40) {
                summary = `Good Try ${name}!`;
                message = "Aim higher 🚀.";
                document.getElementById("trophy").textContent = "🙂";
            } else {
                summary = `Try Again ${name}!`;
                message = "Don't worry, keep practicing 💪.";
                document.getElementById("trophy").textContent = "😢";
            }
            document.getElementById("summary").textContent = summary;
            document.getElementById("message").textContent = message;

            // Update badge based on accuracy
            if (accuracy === 100) {
                document.getElementById("badge").textContent = "Perfect!";
            } else if (accuracy >= 60) {
                document.getElementById("badge").textContent = "Fast Learner";
            } else {
                document.getElementById("badge").textContent = "Keep Going!";
            }

            // Show level up if high score
            if (accuracy >= 80) {
                document.getElementById("levelUp").classList.remove("hidden");
            }

            // Create pie chart
            const ctx = document.getElementById('resultChart').getContext('2d');
            new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: ['Correct', 'Wrong'],
                    datasets: [{
                        data: [correct, wrong],
                        backgroundColor: ['#34d399', '#f87171']
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            position: 'bottom'
                        }
                    }
                }
            });

            // Emoji animation
            function launchEmojis() {
                const emojis = ["🎉", "🌟", "💰", "🏆", "🔥"];
                const emoji = document.createElement("div");
                emoji.classList.add("emoji-float");
                emoji.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                emoji.style.left = Math.random() * window.innerWidth + "px";
                emoji.style.top = window.innerHeight + "px"; // Start from bottom
                document.body.appendChild(emoji);
                setTimeout(() => emoji.remove(), 4000);
            }

            // Launch emojis on load
            if (accuracy >= 60) {
                setInterval(launchEmojis, 500);
            }

            // Update streak and rank (placeholder for now - you can fetch from backend later)
            document.getElementById("streak").textContent = "Today";
            document.getElementById("rank").textContent = "N/A";

            // Button actions
            document.querySelector('button:nth-of-type(1)').onclick = function () {
                // Retry - go back to quiz selection
                window.location.href = '/student_quizzes';
            };

            document.querySelector('button:nth-of-type(2)').onclick = function () {
                // Leaderboard - go to level page
                window.location.href = '/level';
            };
        </script>
</body>

</html>
